name: runtime-publish

on:
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      # Always build — validates the package is constructible.
      - run: |
          cd trellis-runtime
          uv build

      # PyPI Trusted Publishing (OIDC): no token, no Infisical.
      # PyPI 侧需注册 trusted publisher:
      #   PyPI Project → Publishing → Add Publisher
      #     Owner/Repository: <this repo>
      #     Workflow filename: runtime-publish.yml
      #     Environment name:  pypi  (必须与本文件的 environment 一致)
      - name: Publish to PyPI
        run: |
          cd trellis-runtime
          uv publish
