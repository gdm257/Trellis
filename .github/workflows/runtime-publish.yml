name: runtime-publish

on:
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      # Always build — validates the package is constructible.
      - run: |
          cd trellis-runtime
          uv build

      # Inject secrets from Infisical (Universal Auth).
      # All connection params come from GitHub vars/secrets — nothing hardcoded.
      # Required GitHub config:
      #   Secret: INFISICAL_CLIENT_SECRET  (Universal Auth client secret)
      #   Var:    INFISICAL_IDENTITY_ID    (Identity ID)
      #   Var:    INFISICAL_CLIENT_ID      (Universal Auth client ID)
      #   Var:    INFISICAL_PROJECT_SLUG   (project slug)
      #   Var:    INFISICAL_ENV_SLUG       (e.g. "prod")
      #   Var:    INFISICAL_SECRET_PATH    (optional, default "/")
      #   Var:    INFISICAL_DOMAIN         (optional, defaults to Infisical Cloud)
      # Infisical secret: PYPI_TOKEN → exported as env $PYPI_TOKEN
      - name: Inject Infisical secrets
        if: ${{ secrets.INFISICAL_CLIENT_SECRET != '' }}
        uses: Infisical/secrets-action@v3.4.0
        with:
          identity-id: ${{ vars.INFISICAL_IDENTITY_ID }}
          client-id: ${{ vars.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          project-slug: ${{ vars.INFISICAL_PROJECT_SLUG }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          secret-path: ${{ vars.INFISICAL_SECRET_PATH }}
          domain: ${{ vars.INFISICAL_DOMAIN }}

      # Publish only when PYPI_TOKEN secret is configured.
      # Without it this workflow acts as a build-only gate.
      - name: Publish to PyPI
        if: ${{ env.PYPI_TOKEN != '' }}
        run: |
          cd trellis-runtime
          uv publish --token "$PYPI_TOKEN"
