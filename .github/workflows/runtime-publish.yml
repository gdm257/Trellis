name: runtime-publish

on:
  push:
    tags:
      - "runtime-v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v3

      # Always build — validates the package is constructible.
      - run: |
          cd trellis-runtime
          uv build

      # Inject secrets from Infisical. Connection config comes from
      # GitHub vars/secrets — nothing hardcoded.
      # Required GitHub config:
      #   Secret: INFISICAL_TOKEN        (Machine Identity token)
      #   Var:    INFISICAL_PROJECT_ID   (Infisical project ID)
      #   Var:    INFISICAL_ENV_SLUG     (e.g. "prod")
      #   Var:    INFISICAL_DOMAIN       (optional, defaults to Infisical Cloud)
      # Infisical secret: PYPI_TOKEN → exported as env $PYPI_TOKEN
      - name: Inject Infisical secrets
        if: ${{ secrets.INFISICAL_TOKEN != '' }}
        uses: Infisical/secrets-action@v3.4.0
        with:
          token: ${{ secrets.INFISICAL_TOKEN }}
          project-id: ${{ vars.INFISICAL_PROJECT_ID }}
          env-slug: ${{ vars.INFISICAL_ENV_SLUG }}
          domain: ${{ vars.INFISICAL_DOMAIN }}

      # Publish only when PYPI_TOKEN secret is configured.
      # Without it this workflow acts as a build-only gate.
      - name: Publish to PyPI
        if: ${{ env.PYPI_TOKEN != '' }}
        run: |
          cd trellis-runtime
          uv publish --token "$PYPI_TOKEN"
